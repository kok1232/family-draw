<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分派典禮｜家族抽籤儀式</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --ink-2:#2b3e63;
    --parchment:#F5F0E1;
    --parchment-2:#ece3cb;
    --gold:#C9A227;
    --gold-soft:#e8cf82;
    --shadow: rgba(15,20,35,0.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    background:
      radial-gradient(ellipse at 20% -10%, #2b3e63 0%, transparent 55%),
      radial-gradient(ellipse at 90% 110%, #223258 0%, transparent 50%),
      var(--ink);
    color:var(--parchment);
    min-height:100vh;
    overflow-x:hidden;
  }
  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 92% 80%, rgba(255,255,255,.3), transparent);
    background-repeat:no-repeat;
  }
  h1,h2,h3,.serif{font-family:'Noto Serif TC', serif;}
  .app{position:relative; z-index:1; max-width:960px; margin:0 auto; padding:32px 20px 80px;}
  .brand{text-align:center; margin-bottom:28px;}
  .brand .eyebrow{letter-spacing:.35em; font-size:11px; color:var(--gold-soft); text-transform:uppercase; margin-bottom:8px;}
  .brand h1{font-size:clamp(28px,5vw,42px); font-weight:900; margin:0; color:var(--parchment);}
  .brand .sub{font-size:13px; color:#a9b6d6; margin-top:6px;}

  .card{
    background: linear-gradient(180deg, rgba(245,240,225,.06), rgba(245,240,225,.02));
    border:1px solid rgba(201,162,39,.28);
    border-radius:18px;
    padding:24px;
    margin-bottom:20px;
    backdrop-filter: blur(2px);
  }
  .card h2{font-size:18px; margin:0 0 16px; color:var(--gold-soft); font-weight:700;}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  label{font-size:12px; color:#c3cce4; display:block; margin-bottom:4px;}
  input[type=text], input[type=number], textarea, select{
    background:rgba(10,16,32,.45);
    border:1px solid rgba(201,162,39,.35);
    color:var(--parchment);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-family:inherit;
    outline:none;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus{border-color:var(--gold);}
  textarea{width:100%; min-height:90px; resize:vertical; line-height:1.6;}
  input[type=color]{width:40px; height:36px; padding:2px; border-radius:8px; border:1px solid rgba(201,162,39,.35); background:transparent; cursor:pointer;}

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:14px;
    padding:11px 20px; border-radius:999px;
    background:var(--gold); color:#241a02;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow:0 6px 18px rgba(201,162,39,.25);
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:disabled{opacity:.35; cursor:not-allowed; transform:none; box-shadow:none;}
  .btn.ghost{background:transparent; color:var(--gold-soft); border:1px solid rgba(201,162,39,.4); box-shadow:none;}
  .btn.danger{background:transparent; color:#e3a5a5; border:1px solid rgba(227,165,165,.45); box-shadow:none;}
  .btn.small{padding:6px 14px; font-size:12px;}

  .family-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .family-row input[type=text]{flex:1; min-width:120px;}
  .swatch{width:22px; height:22px; border-radius:50%; flex:none; border:2px solid rgba(255,255,255,.35);}

  .cohort-block{border-top:1px dashed rgba(201,162,39,.25); padding-top:16px; margin-top:16px;}
  .cohort-head{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:8px;}
  .pill{font-size:11px; padding:3px 10px; border-radius:999px; background:rgba(201,162,39,.15); color:var(--gold-soft); border:1px solid rgba(201,162,39,.3);}

  /* Stage */
  .stage{
    display:flex; flex-direction:column; align-items:center; padding:40px 20px 30px;
  }
  .progress-line{font-size:13px; color:#a9b6d6; margin-bottom:22px; letter-spacing:.05em;}
  .dial-wrap{position:relative; width:min(78vw,300px); height:min(78vw,300px); margin-bottom:26px;}
  .dial{
    width:100%; height:100%; border-radius:50%;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 0 0 6px rgba(0,0,0,.25), inset 0 0 30px rgba(0,0,0,.35);
    position:relative;
    transition: filter .4s ease;
  }
  .dial-center{
    position:absolute; left:50%; top:50%; width:34%; height:34%;
    transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(circle, var(--parchment) 0%, var(--parchment-2) 70%, #cbb98a 100%);
    box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 0 8px rgba(0,0,0,.15);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif TC',serif; font-weight:900; color:var(--ink);
    font-size:12px; text-align:center; padding:6px; z-index:3;
  }
  .needle{
    position:absolute; left:50%; top:50%; width:6px; height:44%;
    transform-origin:50% 100%;
    transform:translate(-50%,-100%) rotate(0deg);
    background:linear-gradient(180deg, var(--gold) 0%, #fff6d8 45%, var(--gold) 100%);
    border-radius:6px 6px 2px 2px;
    box-shadow:0 0 12px rgba(255,220,120,.7);
    z-index:2;
  }
  .needle::after{
    content:''; position:absolute; left:50%; top:-4px; width:16px; height:16px;
    transform:translateX(-50%); background:var(--gold); border-radius:50%;
    box-shadow:0 0 10px rgba(255,220,120,.9);
  }
  .needle.spinning{transition: transform 2.6s cubic-bezier(.15,.85,.25,1);}

  .reveal-card{
    text-align:center; min-height:64px;
  }
  .reveal-name{font-size:clamp(24px,5vw,34px); font-weight:900; margin:0 0 4px;}
  .reveal-family{font-size:15px; font-weight:700; letter-spacing:.06em; opacity:0; transform:translateY(6px); transition:all .5s ease;}
  .reveal-family.show{opacity:1; transform:translateY(0);}

  .stage-actions{display:flex; gap:14px; margin-top:28px;}

  .tally{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:30px;}
  .tally-item{
    background:rgba(10,16,32,.4); border:1px solid rgba(201,162,39,.25); border-radius:12px;
    padding:10px 14px; min-width:110px; text-align:center;
  }
  .tally-dot{width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px;}
  .tally-count{font-family:'Noto Serif TC',serif; font-weight:900; font-size:18px;}
  .bar{height:5px; border-radius:999px; background:rgba(255,255,255,.12); margin-top:6px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:999px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{padding:8px 10px; text-align:left; border-bottom:1px solid rgba(201,162,39,.18);}
  th{color:var(--gold-soft); font-weight:700;}

  .top-actions{display:flex; justify-content:flex-end; gap:10px; margin-bottom:10px;}
  .hint{font-size:12px; color:#8d99bc; margin-top:6px; line-height:1.6;}
  .empty{text-align:center; color:#8d99bc; padding:30px 0; font-size:14px;}
  .flex-between{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  select{cursor:pointer;}
  ::selection{background:rgba(201,162,39,.4);}
  @media (max-width:520px){
    .stage-actions{flex-direction:column; width:100%;}
    .stage-actions .btn{width:100%;}
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="app">
  <div class="brand">
    <div class="eyebrow">National Dong Hwa EMBA</div>
    <h1>分派典禮</h1>
    <div class="sub">每一屆，平均分配到每個家族 — 但每一位，都是被單獨唱名的</div>
  </div>

  <!-- SETUP VIEW -->
  <div id="view-setup">
    <div class="card">
      <div class="flex-between">
        <h2>家族設定</h2>
        <button class="btn ghost small" onclick="addFamily()">＋ 新增家族</button>
      </div>
      <div id="family-list"></div>
      <div class="hint">建議 3～6 個家族。顏色會用在羅盤與名單標示上，請盡量選擇彼此有區隔的顏色。</div>
    </div>

    <div class="card">
      <div class="flex-between">
        <h2>屆別名單</h2>
        <button class="btn ghost small" onclick="addCohort()">＋ 新增屆別</button>
      </div>
      <div id="cohort-list"></div>
      <div class="hint">每個屆別貼上名單（一行一位）。系統會在該屆內，把人數盡量平均分給每個家族，多出的名額會隨機分配給不同家族，不會每次都是同一個家族多一位。</div>
    </div>

    <div class="card">
      <h2>開始儀式</h2>
      <div class="row" style="gap:16px; align-items:flex-end;">
        <div>
          <label>選擇要進行的屆別</label>
          <select id="cohort-select"></select>
        </div>
        <button class="btn" id="start-btn" onclick="startCeremony()">開始這一屆的分派</button>
      </div>
      <div class="hint" id="setup-warning"></div>
    </div>

    <div class="card" id="past-results-card" style="display:none;">
      <div class="flex-between">
        <h2>已完成的屆別</h2>
        <button class="btn ghost small" onclick="exportAllCSV()">匯出全部結果 CSV</button>
      </div>
      <div id="past-results-list"></div>
    </div>
  </div>

  <!-- STAGE VIEW -->
  <div id="view-stage" style="display:none;">
    <div class="top-actions">
      <button class="btn ghost small" onclick="backToSetup()">← 返回設定</button>
    </div>
    <div class="card">
      <div class="stage">
        <div class="progress-line" id="stage-progress">第 1 / 1 位　｜　114屆</div>

        <div class="dial-wrap">
          <div class="dial" id="dial"></div>
          <div class="needle" id="needle"></div>
          <div class="dial-center" id="dial-center">準備中</div>
        </div>

        <div class="reveal-card">
          <p class="reveal-name" id="reveal-name">﹘</p>
          <p class="reveal-family" id="reveal-family">分配至　家族名稱</p>
        </div>

        <div class="stage-actions">
          <button class="btn" id="sort-btn" onclick="runSort()">唱名分類</button>
          <button class="btn ghost" id="next-btn" onclick="nextStudent()" disabled>下一位 →</button>
        </div>

        <div class="tally" id="tally"></div>
      </div>
    </div>
  </div>

  <!-- COHORT DONE VIEW -->
  <div id="view-done" style="display:none;">
    <div class="card">
      <h2 id="done-title">本屆分派完成</h2>
      <table id="done-table"><thead><tr><th>#</th><th>姓名</th><th>家族</th></tr></thead><tbody></tbody></table>
      <div class="row" style="margin-top:18px;">
        <button class="btn" onclick="backToSetup()">返回設定，進行下一屆</button>
        <button class="btn ghost" onclick="exportCohortCSV()">匯出本屆 CSV</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------- 狀態 ---------- */
const DEFAULT_FAMILIES = [
  {name:'翊風家族', color:'#8B2635'},
  {name:'凌岳家族', color:'#1D3F72'},
  {name:'臨川家族', color:'#2D5A3D'},
  {name:'昭曜家族', color:'#B8860B'},
];

let state = {
  families: JSON.parse(JSON.stringify(DEFAULT_FAMILIES)),
  cohorts: [ { name:'114屆', raw:'' }, { name:'115屆', raw:'' } ],
  results: {} // cohortName -> [{name, familyIndex}]
};

let ceremony = null; // {cohortName, queue:[{name}], index, assignments:[{name,familyIndex}]}

/* ---------- 工具 ---------- */
function uid(){return Math.random().toString(36).slice(2,9);}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function parseNames(raw){
  return raw.split('\n').map(s=>s.trim()).filter(Boolean);
}

/* ---------- 家族設定 UI ---------- */
function renderFamilies(){
  const wrap = document.getElementById('family-list');
  wrap.innerHTML = '';
  state.families.forEach((f, idx)=>{
    const row = document.createElement('div');
    row.className = 'family-row';
    row.innerHTML = `
      <input type="color" value="${f.color}" onchange="updateFamily(${idx},'color',this.value)">
      <input type="text" value="${f.name}" placeholder="家族名稱" onchange="updateFamily(${idx},'name',this.value)">
      <button class="btn danger small" onclick="removeFamily(${idx})" ${state.families.length<=2?'disabled':''}>移除</button>
    `;
    wrap.appendChild(row);
  });
}
function addFamily(){
  const palette = ['#6B4C93','#4A5859','#9C4A2B','#2A6F77','#7A5C2E','#3E4A89'];
  const color = palette[state.families.length % palette.length];
  state.families.push({name:`家族${state.families.length+1}`, color});
  renderFamilies();
  refreshCohortSelect();
}
function removeFamily(idx){
  if(state.families.length<=2) return;
  state.families.splice(idx,1);
  renderFamilies();
  refreshCohortSelect();
}
function updateFamily(idx,key,val){
  state.families[idx][key]=val;
}

/* ---------- 屆別設定 UI ---------- */
function renderCohorts(){
  const wrap = document.getElementById('cohort-list');
  wrap.innerHTML = '';
  state.cohorts.forEach((c, idx)=>{
    const names = parseNames(c.raw);
    const block = document.createElement('div');
    block.className = 'cohort-block';
    block.innerHTML = `
      <div class="cohort-head">
        <input type="text" value="${c.name}" style="font-weight:700;" onchange="updateCohortName(${idx},this.value)">
        <span class="pill">${names.length} 人</span>
        <button class="btn danger small" onclick="removeCohort(${idx})" ${state.cohorts.length<=1?'disabled':''}>移除此屆</button>
      </div>
      <textarea placeholder="貼上名單，一行一位" oninput="updateCohortRaw(${idx},this.value)">${c.raw}</textarea>
    `;
    wrap.appendChild(block);
  });
  refreshCohortSelect();
}
function addCohort(){
  state.cohorts.push({name:`第${state.cohorts.length+1}屆`, raw:''});
  renderCohorts();
}
function removeCohort(idx){
  if(state.cohorts.length<=1) return;
  const removedName = state.cohorts[idx].name;
  state.cohorts.splice(idx,1);
  delete state.results[removedName];
  renderCohorts();
  renderPastResults();
}
function updateCohortName(idx,val){
  const oldName = state.cohorts[idx].name;
  if(state.results[oldName]){
    state.results[val] = state.results[oldName];
    delete state.results[oldName];
  }
  state.cohorts[idx].name = val;
  refreshCohortSelect();
  renderPastResults();
}
function updateCohortRaw(idx,val){
  state.cohorts[idx].raw = val;
  const pill = document.querySelectorAll('.cohort-block .pill')[idx];
  if(pill) pill.textContent = `${parseNames(val).length} 人`;
}

function refreshCohortSelect(){
  const sel = document.getElementById('cohort-select');
  const currentVal = sel.value;
  sel.innerHTML = '';
  state.cohorts.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.name;
    const done = state.results[c.name] ? '（已完成，重跑將覆蓋）' : '';
    opt.textContent = c.name + done;
    sel.appendChild(opt);
  });
  if([...sel.options].some(o=>o.value===currentVal)) sel.value = currentVal;
}

/* ---------- 分配演算法 ---------- */
function assignFairly(names, familyCount){
  const n = names.length;
  const base = Math.floor(n / familyCount);
  const remainder = n % familyCount;
  const quotas = new Array(familyCount).fill(base);
  const extraFamilies = shuffle([...Array(familyCount).keys()]).slice(0, remainder);
  extraFamilies.forEach(i => quotas[i]++);

  let familyPool = [];
  quotas.forEach((q, familyIdx)=>{ for(let i=0;i<q;i++) familyPool.push(familyIdx); });
  familyPool = shuffle(familyPool);

  const shuffledNames = shuffle(names);
  return shuffledNames.map((name, i)=>({name, familyIndex: familyPool[i]}));
}

/* ---------- 儀式流程 ---------- */
function startCeremony(){
  const sel = document.getElementById('cohort-select');
  const cohortName = sel.value;
  const cohort = state.cohorts.find(c=>c.name===cohortName);
  const names = parseNames(cohort.raw);
  const warn = document.getElementById('setup-warning');
  warn.textContent = '';

  if(!cohort){ return; }
  if(names.length === 0){
    warn.textContent = `「${cohortName}」目前沒有名單，請先貼上學員姓名。`;
    return;
  }
  if(state.families.length < 2){
    warn.textContent = '請至少設定 2 個家族。';
    return;
  }

  const assignments = assignFairly(names, state.families.length);
  ceremony = {
    cohortName,
    queue: shuffle(assignments), // 揭曉順序打亂，跟分配結果彼此獨立
    index: 0,
    done: []
  };

  document.getElementById('view-setup').style.display = 'none';
  document.getElementById('view-done').style.display = 'none';
  document.getElementById('view-stage').style.display = 'block';
  buildDial();
  renderTally();
  showCurrentStudent();
}

function buildDial(){
  const dial = document.getElementById('dial');
  const n = state.families.length;
  const seg = 360/n;
  const stops = state.families.map((f,i)=>`${f.color} ${i*seg}deg ${(i+1)*seg}deg`).join(', ');
  dial.style.background = `conic-gradient(${stops})`;
}

function showCurrentStudent(){
  const {queue, index, cohortName} = ceremony;
  document.getElementById('stage-progress').textContent = `第 ${index+1} / ${queue.length} 位　｜　${cohortName}`;
  document.getElementById('reveal-name').textContent = queue[index].name;
  const rf = document.getElementById('reveal-family');
  rf.classList.remove('show');
  rf.textContent = '';
  document.getElementById('dial-center').textContent = '準備中';
  document.getElementById('dial-center').style.color = '';
  document.getElementById('sort-btn').disabled = false;
  document.getElementById('sort-btn').textContent = '唱名分類';
  document.getElementById('next-btn').disabled = true;

  const needle = document.getElementById('needle');
  needle.classList.remove('spinning');
  // 重置角度但不要有動畫感
  needle.style.transition = 'none';
  needle.style.transform = `translate(-50%,-100%) rotate(0deg)`;
  void needle.offsetWidth; // reflow
}

function runSort(){
  const {queue, index} = ceremony;
  const current = queue[index];
  const family = state.families[current.familyIndex];
  const n = state.families.length;
  const seg = 360/n;
  const targetAngle = current.familyIndex*seg + seg/2;
  const spins = 4*360 + targetAngle;

  const needle = document.getElementById('needle');
  needle.classList.add('spinning');
  needle.style.transition = 'transform 2.6s cubic-bezier(.15,.85,.25,1)';
  needle.style.transform = `translate(-50%,-100%) rotate(${spins}deg)`;

  document.getElementById('sort-btn').disabled = true;

  setTimeout(()=>{
    const center = document.getElementById('dial-center');
    center.textContent = family.name;
    center.style.color = '#241a02';
    const rf = document.getElementById('reveal-family');
    rf.textContent = `分配至　${family.name}`;
    rf.style.color = family.color;
    rf.classList.add('show');

    ceremony.done.push(current);
    updateTallyCounts();
    document.getElementById('next-btn').disabled = false;
    document.getElementById('sort-btn').textContent = '已分類';
  }, 2650);
}

function nextStudent(){
  ceremony.index++;
  if(ceremony.index >= ceremony.queue.length){
    finishCeremony();
    return;
  }
  showCurrentStudent();
}

function finishCeremony(){
  state.results[ceremony.cohortName] = ceremony.done;
  document.getElementById('view-stage').style.display = 'none';
  document.getElementById('view-done').style.display = 'block';
  document.getElementById('done-title').textContent = `${ceremony.cohortName}　分派完成`;
  const tbody = document.querySelector('#done-table tbody');
  tbody.innerHTML = '';
  ceremony.done.forEach((d,i)=>{
    const fam = state.families[d.familyIndex];
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(d.name)}</td><td style="color:${fam.color};font-weight:700;">${escapeHtml(fam.name)}</td>`;
    tbody.appendChild(tr);
  });
}

function backToSetup(){
  ceremony = null;
  document.getElementById('view-stage').style.display = 'none';
  document.getElementById('view-done').style.display = 'none';
  document.getElementById('view-setup').style.display = 'block';
  refreshCohortSelect();
  renderPastResults();
}

/* ---------- 即時累計看板 ---------- */
function renderTally(){
  const tally = document.getElementById('tally');
  tally.innerHTML = '';
  state.families.forEach((f)=>{
    const div = document.createElement('div');
    div.className = 'tally-item';
    div.id = `tally-${f.name}`;
    div.innerHTML = `
      <div><span class="tally-dot" style="background:${f.color}"></span>${escapeHtml(f.name)}</div>
      <div class="tally-count" data-count="0">0</div>
      <div class="bar"><i style="width:0%; background:${f.color};"></i></div>
    `;
    tally.appendChild(div);
  });
}
function updateTallyCounts(){
  const totalByFamily = new Array(state.families.length).fill(0);
  ceremony.done.forEach(d=> totalByFamily[d.familyIndex]++);
  const total = ceremony.done.length;
  state.families.forEach((f,i)=>{
    const el = document.getElementById(`tally-${f.name}`);
    if(!el) return;
    el.querySelector('.tally-count').textContent = totalByFamily[i];
    const pct = total ? Math.round((totalByFamily[i]/ceremony.queue.length)*100) : 0;
    el.querySelector('.bar > i').style.width = pct+'%';
  });
}

/* ---------- 過往結果 / 匯出 ---------- */
function renderPastResults(){
  const card = document.getElementById('past-results-card');
  const list = document.getElementById('past-results-list');
  const names = Object.keys(state.results);
  if(names.length===0){ card.style.display='none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  names.forEach(name=>{
    const arr = state.results[name];
    const row = document.createElement('div');
    row.className = 'row';
    row.style.justifyContent = 'space-between';
    row.style.marginBottom = '8px';
    row.innerHTML = `<span>${escapeHtml(name)}　<span class="pill">${arr.length} 人已分派</span></span>`;
    list.appendChild(row);
  });
}

function toCSV(rows){
  const header = 'ID,姓名,家族\n';
  const body = rows.map((d,i)=>`${i+1},${d.name},${state.families[d.familyIndex].name}`).join('\n');
  return '\uFEFF'+header+body;
}
function downloadCSV(filename, content){
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCohortCSV(){
  if(!ceremony) return;
  downloadCSV(`${ceremony.cohortName}_分派結果.csv`, toCSV(ceremony.done));
}
function exportAllCSV(){
  const header = 'ID,屆別,姓名,家族\n';
  let rows = [];
  Object.keys(state.results).forEach(cohortName=>{
    state.results[cohortName].forEach(d=>{
      rows.push(`${rows.length+1},${cohortName},${d.name},${state.families[d.familyIndex].name}`);
    });
  });
  downloadCSV('全部屆別_分派結果.csv', '\uFEFF'+header+rows.join('\n'));
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------- 初始化 ---------- */
renderFamilies();
renderCohorts();
renderPastResults();
</script>
